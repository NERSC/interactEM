name: Docker Bake Build and Push
# This is mostly taken from
# here: https://docs.docker.com/build/ci/github-actions/multi-platform/#with-bake
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'README.md'
      - 'LICENSE'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'README.md'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io/nersc/interactem

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      services: ${{ steps.services.outputs.services }}
      all-images: ${{ steps.services.outputs.all-images }}
      can-push: ${{ steps.perms.outputs.can-push }}
      publish: ${{ steps.perms.outputs.publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        run: |
          TAG=$(git rev-parse --short=6 HEAD)
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG}"

      - name: Define services
        id: services
        run: |
          # Extract services from the prod group in docker-bake.hcl and docker-bake-ci.hcl
          SERVICES=$(docker buildx bake -f docker-bake.hcl -f docker-bake-ci.hcl prod --print | jq -cr '[.group.prod.targets[]]')
          echo "Services found: ${SERVICES}"
          echo "services=${SERVICES}" >> $GITHUB_OUTPUT

          # Create combined list including base image for merge-manifests
          ALL_IMAGES=$(echo ${SERVICES} | jq -c '. + ["interactem"]')
          echo "All images (including base): ${ALL_IMAGES}"
          echo "all-images=${ALL_IMAGES}" >> $GITHUB_OUTPUT
        working-directory: ./docker

      - name: Compute permissions
        id: perms
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name || '' }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" != "pull_request" ] || [ "$HEAD_REPO" = "$REPO" ]; then
            echo "can-push=true" >> $GITHUB_OUTPUT
          else
            echo "can-push=false" >> $GITHUB_OUTPUT
          fi

          if [ "$EVENT_NAME" = "push" ] && [ "$REF" = "refs/heads/main" ]; then
            echo "publish=true" >> $GITHUB_OUTPUT
          else
            echo "publish=false" >> $GITHUB_OUTPUT
          fi

  build-base:
    needs:
      - prepare
    strategy:
      matrix:
        include:
          - platform: amd64
            runner: ubuntu-24.04
            docker-platform: linux/amd64
          - platform: arm64
            runner: ubuntu-24.04-arm
            docker-platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: needs.prepare.outputs.can-push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push base image by digest
        id: bake
        uses: docker/bake-action@v6
        with:
          source: .
          files: |
            ./docker/docker-bake.hcl
            ./docker/docker-bake-ci.hcl
          targets: base
          set: |
            *.platform=${{ matrix.docker-platform }}
            ${{ needs.prepare.outputs.can-push == 'true' && '*.output=type=image,push-by-digest=true,name-canonical=true,push=true' || '*.output=type=docker' }}
            ${{ needs.prepare.outputs.can-push == 'true' && '' || '*.cache-to=type=inline' }}
            *.tags=${{ env.REGISTRY }}/interactem
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          CACHE_PLATFORM: ${{ matrix.platform }}

      - name: Export digest
        if: needs.prepare.outputs.can-push == 'true'
        run: |
          mkdir -p /tmp/digests
          digest="${{ fromJSON(steps.bake.outputs.metadata).base['containerimage.digest'] }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: needs.prepare.outputs.can-push == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: interactem-digest-${{ matrix.platform }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  build-services:
    needs: [prepare, build-base]
    strategy:
      matrix:
        platform:
          - { name: amd64, runner: ubuntu-24.04, docker: linux/amd64 }
          - { name: arm64, runner: ubuntu-24.04-arm, docker: linux/arm64 }
        service: ${{ fromJson(needs.prepare.outputs.services) }}
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: needs.prepare.outputs.can-push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push ${{ matrix.service }} by digest
        id: bake
        uses: docker/bake-action@v6
        with:
          source: .
          files: |
            ./docker/docker-bake.hcl
            ./docker/docker-bake-ci.hcl
          targets: ${{ matrix.service }}
          set: |
            *.platform=${{ matrix.platform.docker }}
            ${{ needs.prepare.outputs.can-push == 'true' && '*.output=type=image,push-by-digest=true,name-canonical=true,push=true' || '*.output=type=docker' }}
            ${{ needs.prepare.outputs.can-push == 'true' && '' || '*.cache-to=type=inline' }}
            *.tags=${{ env.REGISTRY }}/${{ matrix.service }}
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          CACHE_PLATFORM: ${{ matrix.platform.name }}

      - name: Export digest
        if: needs.prepare.outputs.can-push == 'true'
        run: |
          mkdir -p /tmp/digests
          digest="${{ fromJSON(steps.bake.outputs.metadata)[matrix.service]['containerimage.digest'] }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: needs.prepare.outputs.can-push == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-digest-${{ matrix.platform.name }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-manifests:
    if: needs.prepare.outputs.publish == 'true'
    needs: [prepare, build-base, build-services, integration-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: ${{ fromJson(needs.prepare.outputs.all-images) }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: ${{ matrix.service }}-digest-*
          merge-multiple: true

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          # Create manifest
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ matrix.service }}:${{ needs.prepare.outputs.tag }} \
            -t ${{ env.REGISTRY }}/${{ matrix.service }}:latest \
            $(printf '${{ env.REGISTRY }}/${{ matrix.service }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ matrix.service }}:${{ needs.prepare.outputs.tag }}

  integration-tests:
    needs: [prepare, build-base, build-services]
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: 1
      XDG_RUNTIME_DIR: /tmp/podman-run
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Start podman socket service
        run: |
          mkdir -p "$XDG_RUNTIME_DIR/podman"
          podman system service --time=0 unix://$XDG_RUNTIME_DIR/podman/podman.sock >/tmp/podman-service.log 2>&1 &

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/interactEM/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend/interactEM
        run: npm ci

      - name: Install Playwright browsers (with system deps)
        working-directory: frontend/interactEM
        run: npx playwright install --with-deps

      - name: Prepare .env and image tags
        run: |
          make setup
          REGISTRY=${{ env.REGISTRY }}
          TAG=${{ needs.prepare.outputs.tag }}
          echo "CACHE_PLATFORM=amd64" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          declare -A images=(
            [BACKEND]=fastapi
            [FRONTEND]=frontend
            [ORCHESTRATOR]=orchestrator
            [CALLOUT]=callout
            [LAUNCHER]=launcher
            [METRICS]=metrics
          )
          for key in "${!images[@]}"; do
            echo "DOCKER_IMAGE_${key}=${REGISTRY}/${images[$key]}" >> $GITHUB_ENV
          done

      - name: Login to GHCR (for cache/images)
        if: needs.prepare.outputs.can-push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Start stack
        run: |
          COMPOSE_FILES="-f docker-compose.yml"
          if [ "${{ needs.prepare.outputs.can-push }}" = "true" ]; then
            COMPOSE_FILES="$COMPOSE_FILES -f docker-compose.cache.yml"
          fi
          USER_ID=$(id -u) GROUP_ID=$(id -g) docker compose $COMPOSE_FILES up --build --force-recreate --remove-orphans -d

      - name: Run integration tests
        run: make integration-test

      - name: Upload Playwright report
        if: always() && (hashFiles('frontend/interactEM/playwright-report/**') != '')
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/interactEM/playwright-report
          if-no-files-found: ignore

      - name: Stop containers
        if: always()
        run: |
          COMPOSE_FILES="-f docker-compose.yml"
          if [ "${{ needs.prepare.outputs.can-push }}" = "true" ]; then
            COMPOSE_FILES="$COMPOSE_FILES -f docker-compose.cache.yml"
          fi
          docker compose $COMPOSE_FILES down

      - name: Show docker compose logs on failure
        if: failure()
        run: |
          COMPOSE_FILES="-f docker-compose.yml"
          if [ "${{ needs.prepare.outputs.can-push }}" = "true" ]; then
            COMPOSE_FILES="$COMPOSE_FILES -f docker-compose.cache.yml"
          fi
          docker compose $COMPOSE_FILES logs --no-color
